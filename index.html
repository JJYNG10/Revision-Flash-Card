<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="flash card for revision." />
    <meta
      name="keywords"
      content="flash card, revision, track cards, revision card progress"
    />
    <title>Revise Smart</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Macondo&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Shippori+Antique+B1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />

    <!--Font awesome-->
    <script
      src="https://kit.fontawesome.com/a80cca17d3.js"
      crossorigin="anonymous"
    ></script>

    <!--Favicon-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/logo/favicon.png"
    />
    <link rel="icon" sizes="32x32" href="assets/images/logo/favicon.png" />
    <link rel="icon" sizes="16x16" href="assets/images/logo/favicon.png" />
  </head>

  <body>
    <!-- Main -->
    <header>
      <section>
        <div class="container">
          <div class="row">
            <div class="col-sm-6 col-lg-6 title">
              <span>Revision Cards</span>
            </div>
          </div>
        </div>
      </section>
    </header>

    <main>
      <section>
        <div class="container">
          <div class="row">
            <div
              class="col-12 d-flex justify-content-between align-items-center"
            >
              <span class="sub-title"> My Cards </span>
            </div>

            <div class="col-12 col-md-8 col-lg-6">
              <div id="revision-cards"></div>
            </div>
          </div>
        </div>

        <div id="revision-modal" class="revision-modal" style="display: none">
          <div class="modal-content">
            <div class="modal-header">
              <h1 id="folder-title" class="folder-title"></h1>
              <div class="card-progress" id="card-progress"></div>

              <button id="close-modal-btn" type="button">
                <i class="fa-solid fa-x"></i>
              </button>
            </div>

            <!-- display card questions -->
            <div class="question-card" id="question-card">
              <h1 id="modal-question"></h1>

              <!-- reveal answer button -->
              <div class="display-answer">
                <button class="btn-icon icon" id="btn-reveal">
                  <span>Reveal answer</span>
                </button>
              </div>
            </div>

            <!-- navigate buttons -->
            <div class="modal-click-button">
              <button id="btn-click-left" class="btn-icon icon-text">
                <i class="fa-solid fa-circle-arrow-left icon"></i>
                <span>To Review</span>
              </button>

              <button id="btn-click-fav" class="btn-icon icon-text">
                <i class="fa-regular fa-star icon"></i>
                <span>Favourite</span>
              </button>
              <button id="btn-click-right" class="btn-icon icon-text">
                <i class="fa-solid fa-circle-right icon"></i>
                <span>Mastered</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
